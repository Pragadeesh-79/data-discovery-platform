<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cipher Scanner — Upload and scan documents to discover personal data.">
  <title>Scanner — Cipher</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- --- NAVBAR --- -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
        Cipher
      </a>
      <div class="navbar-links" id="navLinks">
        <a href="index.html">Dashboard</a>
        <a href="scan.html" class="active">Scanner</a>
      </div>
    </div>
  </nav>

  <!-- --- SCANNER PAGE --- -->
  <section class="scanner-page">
    <div class="container">
      <div class="section-header" style="margin-bottom:40px;">
        <span class="section-label">Data Scanner</span>
        <h2>Scan & Discover <span class="gradient-text">Personal Data</span></h2>
      </div>

      <!-- Upload Zone -->
      <div class="upload-zone reveal">
        <div class="upload-icon"><i class="fas fa-cloud-arrow-up"></i></div>
        <h3>Drag & Drop Files to Scan</h3>
        <p id="uploadText">or click to browse your computer</p>
      </div>
      
      <input type="file" id="fileUploadInput" style="display: none;" accept=".pdf,.csv,.xls,.xlsx,.docx">
      
      <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn-primary" id="uploadProcessBtn" style="padding: 12px 32px; font-size: 1.1rem; border-radius: 8px;">
          <i class="fas fa-shield-halved"></i> Upload and Scan
        </button>
      </div>

      <!-- Scan Progress -->
      <div class="scan-progress" style="display:none; margin-top:20px;">
        <div class="progress-bar-container" style="background:#eee; height:10px; border-radius:5px; overflow:hidden;">
          <div class="progress-bar-fill" style="width:0%; background:var(--accent-blue); height:100%; transition:width 0.3s ease;"></div>
        </div>
        <p class="progress-text" style="font-size:0.85rem; color:var(--text-secondary); text-align:center; margin-top:8px;">Preparing scan...</p>
      </div>

      <!-- Scan Results -->
      <div class="scan-results reveal" style="display:none; margin-top:48px;">
        <h3 style="margin-bottom:20px;">Scan Results <span class="live-badge" style="background:#4ade80; color:#111; padding:2px 8px; border-radius:12px; font-size:12px;">Complete</span></h3>
        <div class="detection-showcase">
          <table class="detection-table" style="width:100%; text-align:left; border-collapse:collapse;">
            <thead>
              <tr style="border-bottom:1px solid #ddd;">
                <th style="padding:8px;">Type</th>
                <th style="padding:8px;">Value</th>
                <th style="padding:8px;">Sensitivity</th>
                <th style="padding:8px;">Location</th>
                <th style="padding:8px;">Risk Score</th>
              </tr>
            </thead>
            <tbody id="scanResultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <!-- 1. API Helper loads FIRST -->
  <script src="js/api.js"></script>
  
  <!-- 2. Scanner Logic depends on API functions -->
  <script src="js/scanner.js"></script>
</body>
</html>
